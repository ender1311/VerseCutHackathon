appId: tv.lifechurch.bible
name: Audio Bible prep (open the audio player — not recorded)
# Clears state, dismisses onboarding as a guest, opens the Bible reader, and taps
# the speaker icon to bring up the Audio Bible player (paused).
---
- retry:
    maxRetries: 2
    commands:
      - clearState
      - launchApp:
          arguments:
            environment: production
      - runFlow:
          when:
            visible: "Allow Paste"
          commands:
            - tapOn: "Allow Paste"
      - runFlow:
          when:
            visible: "Seek God"
          commands:
            - tapOn:
                id: "DISMISS_BUTTON"
      - runFlow:
          when:
            visible: "Enable Verse of the Day?"
          commands:
            - tapOn: "Not Now"
- tapOn:
    id: bible_tab
- waitForAnimationToEnd:
    timeout: 2500
- tapOn:
    point: "72%,10%"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    point: "50%,84%"
- waitForAnimationToEnd:
    timeout: 1500
